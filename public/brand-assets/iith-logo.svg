<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="14" fill="#FFFFFF"/>
  <!-- Outer circle -->
  <circle cx="50" cy="46" r="30" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <!-- Inner emblem - simplified IIT crest -->
  <circle cx="50" cy="46" r="22" fill="none" stroke="#1A237E" stroke-width="1.5"/>
  <!-- Gear/cog teeth around inner circle -->
  <g stroke="#1A237E" stroke-width="2" fill="none">
    <line x1="50" y1="22" x2="50" y2="18"/>
    <line x1="50" y1="70" x2="50" y2="74"/>
    <line x1="28" y1="46" x2="24" y2="46"/>
    <line x1="72" y1="46" x2="76" y2="46"/>
    <line x1="35" y1="31" x2="32" y2="28"/>
    <line x1="65" y1="31" x2="68" y2="28"/>
    <line x1="35" y1="61" x2="32" y2="64"/>
    <line x1="65" y1="61" x2="68" y2="64"/>
  </g>
  <!-- IIT text in center -->
  <text x="50" y="44" font-family="'Times New Roman', Georgia, serif" font-weight="700" font-size="14" fill="#1A237E" text-anchor="middle">IIT</text>
  <!-- H for Hyderabad -->
  <text x="50" y="56" font-family="'Times New Roman', Georgia, serif" font-weight="600" font-size="9" fill="#1A237E" text-anchor="middle">H</text>
  <!-- Bottom text -->
  <text x="50" y="88" font-family="Arial, sans-serif" font-weight="600" font-size="7.5" fill="#1A237E" text-anchor="middle">IIT HYDERABAD</text>
</svg>
